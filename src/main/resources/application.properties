## database setting
#spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
#spring.datasource.url=jdbc:oracle:thin:@192.168.0.20:1521:xe
#spring.datasource.username=admin
#spring.datasource.password=1234
#>>>>>>> branch 'main' of https://github.com/selina17171771/stackup.git
# =======
mybatis.mapper-locations=classpath:/mapper/**/**.xml
mybatis.type-aliases-package=com.edu.springboot.jdbc


# Email Setting
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# 환경 변수에서 가져오도록 설정
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PW}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#포트폴리오 pdf 저장 경로 환경변수
stackup.storage.root=${STACKUP_STORAGE_ROOT:C:/02WorkSpaces/FinalProject/stackup_storage}

# 1. 네이버 클라이언트 설정
spring.security.oauth2.client.registration.naver.client-id=G1Rg7MvnBUC1Z3eqiPHS
spring.security.oauth2.client.registration.naver.client-secret=f9YVKOAVAG
spring.security.oauth2.client.registration.naver.client-name=Naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.naver.scope=name,email

# 2. 네이버 프로바이더 설정 (네이버 전용 주소들)
spring.security.oauth2.client.provider.naver.authorization-uri=https://nid.naver.com/oauth2.0/authorize
spring.security.oauth2.client.provider.naver.token-uri=https://nid.naver.com/oauth2.0/token
spring.security.oauth2.client.provider.naver.user-info-uri=https://openapi.naver.com/v1/nid/me
spring.security.oauth2.client.provider.naver.user-name-attribute=response